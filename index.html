<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <span>Loading...</span>
</div>

<!-- MAIN CONTENT -->
<div class="overlay hidden" id="content">
  <h1 id="title">This is for you 💜</h1>
  <button id="playBtn">Play 💜</button>
</div>

<!-- VIDEO -->
<video id="bg-video" autoplay loop playsinline muted>
  <source src="assets/video/siren.mp4" type="video/mp4">
</video>

<!-- MUSIC -->
<audio id="bg-music" loop>
  <source src="assets/audio/siren.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
