<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#bg-video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  top: 25%;
  width: 100%;
  text-align: center;
  color: white;
  z-index: 10;
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 60px;
}

#playBtn {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 16px;
}
</style>

</head>
<body>

<div class="overlay">
  <h1>This is for you 💜</h1>
  <button id="playBtn">Play 💜</button>
</div>

<!-- VIDEO (DOIM OVOZSIZ) -->
<video id="bg-video" autoplay loop playsinline muted>
  <source src="assets/video/siren.mp4" type="video/mp4">
</video>

<!-- FAOL AUDIO -->
<audio id="bg-music" loop>
  <source src="assets/audio/siren.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
